name: geoscan
description: "Geoscan Intelligence System — predictive geopolitical & market intelligence (mobile)."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Networking
  dio: ^5.4.0
  web_socket_channel: ^2.4.0

  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.0

  # State management
  provider: ^6.1.0

  # Navigation
  go_router: ^12.0.0

  # Formatting & i18n
  intl: ^0.19.0

  # Charts
  fl_chart: ^0.66.0

  # Images & loading
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0

  # Push notifications (Phase 6) — requires Firebase config per platform
  firebase_core: ^2.24.0
  firebase_messaging: ^14.7.0
  flutter_local_notifications: ^16.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
