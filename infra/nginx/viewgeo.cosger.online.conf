# =============================================================================
# Geoscan Web Portal — Nginx server block
# Domain: viewgeo.cosger.online
#   - Serves the static Next.js export from /opt/geoscan/web-portal
#   - Proxies /api/ -> http://127.0.0.1:8000/ (same-origin → no CORS) so the
#     public read endpoints (/public/*) are reachable as /api/public/*
#
# INSTALL (on server, sudo):
#   sudo cp infra/nginx/viewgeo.cosger.online.conf \
#           /etc/nginx/sites-available/viewgeo.cosger.online
#   sudo ln -sf /etc/nginx/sites-available/viewgeo.cosger.online \
#               /etc/nginx/sites-enabled/viewgeo.cosger.online
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d viewgeo.cosger.online      # adds :443 + cert
# =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name viewgeo.cosger.online;

    root /opt/geoscan/web-portal;
    index index.html;

    # gzip for the static bundle
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Public API (same-origin) → backend. Trailing slash strips the /api prefix.
    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static SPA (Next.js export, trailingSlash) — dir → index.html, else 404 page.
    location / {
        try_files $uri $uri/ /404.html;
    }

    # Long cache for hashed build assets
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
