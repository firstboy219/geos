# =============================================================================
# Geoscan API — Nginx server block (KB 9.1)
# Domain: apigeo.cosger.online  ->  reverse proxy ke http://127.0.0.1:8000
# -----------------------------------------------------------------------------
# STATUS: subdomain apigeo.cosger.online BELUM dikonfigurasi di server.
#         Server block ini + sertifikat Certbot adalah LANGKAH MANUAL.
#
# LANGKAH PASANG (di server, sebagai root/sudo):
#   1) Pastikan DNS A record apigeo.cosger.online -> IP server sudah propagate.
#   2) Copy config:
#        sudo cp infra/nginx/apigeo.cosger.online.conf \
#                /etc/nginx/sites-available/apigeo.cosger.online
#   3) Symlink ke sites-enabled:
#        sudo ln -s /etc/nginx/sites-available/apigeo.cosger.online \
#                   /etc/nginx/sites-enabled/apigeo.cosger.online
#   4) Terbitkan sertifikat TLS (Certbot akan otomatis menambah blok :80->:443
#      redirect + path sertifikat; jika nginx -t error karena cert belum ada,
#      jalankan certbot dulu dengan --nginx, atau gunakan standalone):
#        sudo certbot --nginx -d apigeo.cosger.online
#      (alternatif tanpa edit otomatis):
#        sudo certbot certonly --nginx -d apigeo.cosger.online
#   5) Test & reload:
#        sudo nginx -t && sudo systemctl reload nginx
#
# CATATAN: backend hanya listen di 127.0.0.1:8000 (lihat infra/docker/run-backend.sh),
#          jadi akses publik HANYA lewat Nginx ini.
# =============================================================================

# Rate limit zone harus didefinisikan di http{} context.
# Jika dipasang sebagai file sites-available, pindahkan baris ini ke
# /etc/nginx/conf.d/geoscan-ratelimit.conf atau ke nginx.conf http{} block.
# limit_req_zone $binary_remote_addr zone=geoscan_api:10m rate=100r/m;

# ── HTTP -> HTTPS redirect (Certbot biasanya menambah ini otomatis) ──
server {
    listen 80;
    listen [::]:80;
    server_name apigeo.cosger.online;

    # Izinkan ACME challenge Certbot
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS server ──
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name apigeo.cosger.online;

    # TLS (path diisi/diverifikasi oleh Certbot)
    ssl_certificate     /etc/letsencrypt/live/apigeo.cosger.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/apigeo.cosger.online/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── Security headers ──
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    server_tokens off;

    # ── Gzip ──
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types application/json application/javascript text/plain text/css;

    # Batas ukuran body (upload payload analisis, dll)
    client_max_body_size 10m;

    # ── API (reverse proxy ke FastAPI) ──
    location / {
        # Rate limiting (butuh limit_req_zone aktif di http{} — lihat catatan di atas)
        # limit_req zone=geoscan_api burst=20 nodelay;

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── WebSocket (real-time vector mutation / alerts) ──
    location /ws {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Koneksi WS panjang — timeout besar
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
